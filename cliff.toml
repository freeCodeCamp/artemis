# git-cliff configuration for artemis
# https://git-cliff.org/docs/configuration
#
# Conventional Commits → CHANGELOG.md sections.
# Pre-1.0 semver: feat → MINOR, fix/perf/refactor → PATCH,
# `BREAKING CHANGE:` body → MINOR (loud) until v1.0.0 cuts.
# See RELEASING.md for the full bump rule.

[changelog]
header = """
# Changelog

All notable changes to artemis are documented here. Format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/); versioning
follows [Semantic Versioning](https://semver.org/spec/v2.0.0.html)
with the pre-1.0 caveat noted in `RELEASING.md`.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | trim }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/freeCodeCamp/artemis/commit/{{ commit.id }})){% if commit.breaking %} **[BREAKING]**{% endif %}
{%- endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
topo_order = false

# Order = display order in each release section.
commit_parsers = [
  { message = "^feat",            group = "<!-- 0 -->Features" },
  { message = "^fix",             group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf",            group = "<!-- 2 -->Performance" },
  { message = "^refactor",        group = "<!-- 3 -->Refactor" },
  { message = "^docs",            group = "<!-- 4 -->Documentation" },
  { message = "^chore\\(deps\\)", group = "<!-- 5 -->Dependencies" },
  { body    = ".*security",       group = "<!-- 6 -->Security" },

  # Hidden — noise that does not belong in operator-facing notes.
  { message = "^test",     skip = true },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^build",    skip = true },
  { message = "^style",    skip = true },
  { message = "^revert",   group = "<!-- 7 -->Reverts" },
  { message = "^Merge",    skip = true },
]

# Treat any `BREAKING CHANGE:` footer as a breaking commit even if the
# subject did not use the `!` shorthand.
[bump]
features_always_bump_minor = true
breaking_always_bump_major = false   # pre-1.0: MINOR for breaking, MAJOR after v1.0.0
initial_tag = "v0.1.0"
