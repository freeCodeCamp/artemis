# sites.yaml — Artemis sites map (dormant cold-start seed)
#
# Post-cutover (artemis@f115198, 2026-05-10) the authoritative store is
# Valkey. This file is **NOT consumed at runtime** — the `sites_yaml`
# backend has been removed. The file is retained as a cold-start
# reference: after a full Valkey wipe an operator can replay entries
# here via `universe sites register <slug> --team <team>...` against a
# freshly-booted artemis to restore the pre-wipe set.
#
# Live mutation surface (staff-gated by REGISTRY_AUTHZ_TEAM):
#   universe sites register <slug> --team <team>[,<team>...]
#   universe sites update   <slug> --team <team>[,<team>...]
#   universe sites rm       <slug>
#   universe sites ls       [--mine]
#
# Schema below is preserved for parity with the live registry shape:
#   sites:
#     <site-slug>:
#       teams: [<gh-team-slug>, ...]
#
# Authorization check per deploy (runtime, against Valkey snapshot):
#   1. artemis resolves caller via GitHub Bearer → GET /user
#   2. registry snapshot lookup <site-slug> → authorized team slugs
#   3. for each team_slug:
#        GET /orgs/freeCodeCamp/teams/{team_slug}/memberships/{user}
#        (cached per (user, team_slug) for GH_MEMBERSHIP_CACHE_TTL,
#         default 300s)
#   4. ANY membership match → 200 / deploy proceeds; ALL miss → 403
#
# `<site>` matches the public hostname `<site>.freecode.camp` (production)
# and `<site>.preview.freecode.camp` (preview). Caddy on gxy-cassiopeia
# reverse-proxies via `r2_alias` (D35 dot-scheme).
#
# fCC GitHub teams reference (verified 2026-04-27):
#   bots, classroom, curriculum, dev-team, devdocs, i18n, mobile,
#   moderators, none, ops, staff

sites:
  # `test` site — used by T34 smoke harness (test.freecode.camp +
  # test.preview.freecode.camp). Authorized: staff only — narrowest
  # team while smoke is being shaken out.
  test:
    teams:
      - staff

  # Smoke
  hello-universe:
    teams:
      - bots
      - staff

  # TOM
  gomoku:
    teams:
      - staff
  reversi:
    teams:
      - staff
  checkers:
    teams:
      - staff
  five-dice:
    teams:
      - staff
  number-tiles:
    teams:
      - staff
