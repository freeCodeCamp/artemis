name: Test

# Reusable: build, vet, race-test, coverage-gate. Called from `ci.yml`
# (auto on push/PR) and `docker.yml` (gating manual image roll).
on:
  workflow_call:

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (race + cover)
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage gate (>=80% on handler + auth)
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out > coverage.txt
          go run ./tools/covgate \
            -threshold 80 \
            -pkg github.com/freeCodeCamp/artemis/internal/auth \
            -pkg github.com/freeCodeCamp/artemis/internal/handler \
            coverage.txt
