name: CD - Docker - GHCR Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write # write needed by the gh-release step on tag push
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Log in to the GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: ghcr.io/freecodecamp/artemis
          # Tag plan:
          #   - semver tags (v0.1.0 → "0.1.0", "0.1"): only on tag push.
          #   - sha-<full-sha>: always — immutable, used as audit anchor.
          #   - branch name: workflow_dispatch / branch push.
          #   - latest: default-branch builds only (not tag push).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Cache Docker layers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-artemis-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-artemis-

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          # VERSION = metadata-action's primary version (semver on tag push,
          # branch name or "sha-<sha>" otherwise). Embedded via -X main.version.
          # COMMIT  = full SHA, immutable audit anchor.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ---------------------------------------------------------------
      # Release-publish steps. Run only on tag push. Slice the matching
      # `[X.Y.Z]` section out of CHANGELOG.md (cliff.toml strips the
      # leading `v`, so tag v0.2.0 maps to changelog heading `[0.2.0]`)
      # and attach it as the GH Release body. Idempotent — re-running
      # against an existing release updates rather than failing.
      # ---------------------------------------------------------------
      - name: Slice CHANGELOG section for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          # awk window: from the matching `## [X.Y.Z]` heading up to (but
          # not including) the next `## [` heading. sed drops the trailing
          # next-heading line. Fails loudly if the section is missing
          # rather than publishing an empty release body.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1 }
            in_section && /^## \[/ && $0 !~ "^## \\[" ver "\\]" { exit }
            in_section { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "FAIL: no [$VERSION] section found in CHANGELOG.md" >&2
            exit 1
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "--- release notes preview ---"
          head -40 "$NOTES_FILE"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          # Pre-release if the tag carries a hyphen suffix (e.g. v0.2.0-rc.1).
          prerelease: ${{ contains(github.ref_name, '-') }}
