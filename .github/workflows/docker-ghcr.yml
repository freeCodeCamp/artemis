name: CD - Docker - GHCR Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write # write needed by the gh-release step on tag push
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # git-cliff renders release notes by walking commits between
          # the previous tag and the current one. Shallow checkout
          # truncates that history and breaks `--current`. Full clone
          # (+ tags) decouples the release-notes generation from
          # CHANGELOG.md state at any specific commit.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Log in to the GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: ghcr.io/freecodecamp/artemis
          # Tag plan:
          #   - semver tags (v0.1.0 → "0.1.0", "0.1"): only on tag push.
          #   - sha-<full-sha>: always — immutable, used as audit anchor.
          #   - branch name: workflow_dispatch / branch push.
          #   - latest: default-branch builds only (not tag push).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Cache Docker layers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-artemis-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-artemis-

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          # VERSION = metadata-action's primary version (semver on tag push,
          # branch name or "sha-<sha>" otherwise). Embedded via -X main.version.
          # COMMIT  = full SHA, immutable audit anchor.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # git-cliff regenerates the release notes section directly from
      # the commit log + cliff.toml — same tool used in
      # `RELEASING.md §3`. Decouples the GH Release body from
      # CHANGELOG.md state at the tagged commit so the workflow stays
      # green regardless of whether the chore-release commit lands
      # before, after, or at the tag.
      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --current --strip all

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.content }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
