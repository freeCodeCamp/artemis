name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: go test (race + cover)
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage gate (>=80% on handler + auth)
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out > coverage.txt
          go run ./tools/covgate \
            -threshold 80 \
            -pkg github.com/freeCodeCamp/artemis/internal/auth \
            -pkg github.com/freeCodeCamp/artemis/internal/handler \
            coverage.txt

  image:
    name: build + push image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/freecodecamp/artemis:${{ github.sha }}
            ghcr.io/freecodecamp/artemis:latest
